<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (() => {
            const VERSION_KEY = 'portfolio_version';
            const RELOAD_GUARD_KEY = 'portfolio_reload_guard';

            const readStorage = (storage, key) => {
                try {
                    return storage.getItem(key);
                } catch {
                    return null;
                }
            };

            const writeStorage = (storage, key, value) => {
                try {
                    storage.setItem(key, value);
                } catch {
                    // Ignore storage write failures in restricted/private environments.
                }
            };

            const readLocalVersion = () => readStorage(window.localStorage, VERSION_KEY) || '';
            const writeLocalVersion = (value) => writeStorage(window.localStorage, VERSION_KEY, value);
            const readReloadGuard = () => readStorage(window.sessionStorage, RELOAD_GUARD_KEY) || '';
            const writeReloadGuard = (value) => writeStorage(window.sessionStorage, RELOAD_GUARD_KEY, value);
            const clearReloadGuard = () => {
                try {
                    window.sessionStorage.removeItem(RELOAD_GUARD_KEY);
                } catch {
                    // Ignore storage failures.
                }
            };

            const initialVersion = readLocalVersion();
            window.__portfolioVersion = initialVersion;
            window.getVersionedAssetUrl = (path) => {
                const version = window.__portfolioVersion || readLocalVersion();
                if (!version) return path;
                const sep = path.includes('?') ? '&' : '?';
                return `${path}${sep}v=${encodeURIComponent(version)}`;
            };

            fetch(`version.json?ts=${Date.now()}`, {
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache' }
            })
                .then((response) => {
                    if (!response.ok) {
                        throw new Error(`Version fetch failed: ${response.status}`);
                    }
                    return response.json();
                })
                .then((data) => {
                    const liveVersion = (typeof data?.version === 'string') ? data.version.trim() : '';
                    if (!liveVersion) return;

                    const localVersion = readLocalVersion();

                    if (!localVersion) {
                        writeLocalVersion(liveVersion);
                        window.__portfolioVersion = liveVersion;
                        return;
                    }

                    if (localVersion === liveVersion) {
                        window.__portfolioVersion = liveVersion;
                        if (readReloadGuard() === liveVersion) {
                            clearReloadGuard();
                        }
                        return;
                    }

                    writeLocalVersion(liveVersion);
                    window.__portfolioVersion = liveVersion;

                    const url = new URL(window.location.href);
                    if (readReloadGuard() === liveVersion) return;
                    if (url.searchParams.get('v') === liveVersion) return;
                    writeReloadGuard(liveVersion);
                    url.searchParams.set('v', liveVersion);
                    window.location.replace(url.toString());
                })
                .catch(() => {
                    // Keep current cached version token on temporary network failures.
                });
        })();
    </script>

    <meta charset="UTF-8">

            styleLink.rel = 'stylesheet';
            styleLink.href = getUrl('style.css');
            document.head.appendChild(styleLink);
        })();
    </script>
</head>
